  <meta charset="utf-8" />

  <title>Mobius System Icons Helper</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
      margin: 24px;
      color: #555;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 36px; font-weight: 300; margin: 0 0 8px; color:#105F7E; }
    .sub { opacity: .8; margin: 0 0 16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input[type="search"] {
      flex:1; min-width:260px; padding:10px 12px; font-size:14px;
      border-radius:10px; border:1px solid rgba(127,127,127,.35);
    }
    .meta { font-size:12px; opacity:.75; }
    .status { margin-top:8px; font-size:12px; opacity:.75; }
    .status a { color:#105F7E; text-decoration:underline; }
    .grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:12px; margin-top:16px;
    }
    .card {
      border:1px solid rgba(127,127,127,.25); border-radius:14px; padding:12px;
      display:grid; grid-template-columns:64px 1fr; gap:12px;
    }
    .glyph {
      width:64px; height:64px; display:grid; place-items:center;
      border-radius:14px; border:1px solid rgba(127,127,127,.25); cursor:pointer;
      background:#fff;
    }
    .glyph:hover { background:#2EBEFC; }
    .glyph svg { width:42px; height:42px; overflow:visible; }
    .glyph path { fill:#555; fill-rule:nonzero; }
    .glyph:hover path { fill:#fff; }
    .name {
      font-weight:700; font-size:14px; margin:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:210px;
    }
    .code {
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size:12px; opacity:.85; margin:6px 0 10px;
    }
    .btns { display:flex; gap:8px; flex-wrap:wrap; }
    button {
      font-size:12px; padding:6px 10px; border-radius:10px;
      border:1px solid rgba(127,127,127,.35); background:transparent; cursor:pointer;
    }
    button:hover { background:#2EBEFC; color:#fff; }
    .toast {
      position:fixed; left:50%; transform:translateX(-50%); bottom:18px;
      padding:10px 12px; border-radius:12px; background:rgba(0,0,0,.75);
      color:white; font-size:12px; opacity:0; pointer-events:none; transition:opacity 120ms ease;
    }
    .toast.show { opacity:1; }
  </style>

  <script>
    const glyphmap = JSON.parse(document.getElementById('glyphmap').textContent);
    const svgpaths = JSON.parse(document.getElementById('svgpaths').textContent);
    const entries = Object.keys(glyphmap).sort((a,b)=>a.localeCompare(b, undefined, {numeric:true, sensitivity:'base'}));
    const q = document.getElementById('q');
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');
    const toast = document.getElementById('toast');
    let toastTimer = null;

    function toHex(codepoint) {
      return codepoint.toString(16).toUpperCase().padStart(4,'0');
    }
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      showToast('Copied: ' + (text.length > 32 ? text.slice(0,32) + '…' : text));
    }
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>toast.classList.remove('show'), 900);
    }
    function makeSvg(name) {
      const d = svgpaths[name] || "";
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 1000 1000");
      svg.setAttribute("aria-hidden", "true");

      const group = document.createElementNS(svgNS, "g");
      group.setAttribute("transform", "translate(0 750) scale(1 -1)");

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill-rule", "nonzero");
      group.appendChild(path);
      svg.appendChild(group);
      return svg;
    }
    function render(filter) {
      const f = (filter || '').trim().toLowerCase();
      const filtered = f ? entries.filter(n => n.toLowerCase().includes(f)) : entries;
      count.textContent = filtered.length + ' / ' + entries.length;

      const frag = document.createDocumentFragment();
      for (const name of filtered) {
        const cp = glyphmap[name];
        const hex = toHex(cp);
        const char = String.fromCodePoint(cp);
        const unicode = "\\u" + hex;
        const xaml = "&#x" + hex + ";";

        const card = document.createElement('div');
        card.className = 'card';

        const glyph = document.createElement('div');
        glyph.className = 'glyph';
        glyph.onclick = () => copyText(char);
        glyph.appendChild(makeSvg(name));

        const body = document.createElement('div');

        const title = document.createElement('p');
        title.className = 'name';
        title.textContent = name;

        const code = document.createElement('p');
        code.className = 'code';
        code.textContent = 'U+' + hex + '   ' + unicode + '   ' + xaml;

        const btns = document.createElement('div');
        btns.className = 'btns';

        for (const [label, value] of [
          ['Copy char', char],
          ['Copy name', name],
          ['Copy unicode', unicode],
          ['Copy XAML', xaml]
        ]) {
          const b = document.createElement('button');
          b.textContent = label;
          b.onclick = () => copyText(value);
          btns.appendChild(b);
        }

        body.appendChild(title);
        body.appendChild(code);
        body.appendChild(btns);
        card.appendChild(glyph);
        card.appendChild(body);
        frag.appendChild(card);
      }

      grid.replaceChildren(frag);
    }
    q.addEventListener('input', () => render(q.value));
    render('');
  </script>
